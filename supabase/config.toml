# A string used to distinguish different Supabase projects on the same host.
project_id = "wviutasgroltjuyxpevc"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "https://nefroquest.com"
additional_redirect_urls = ["http://localhost:3000"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true

[edge_runtime]
enabled = true
policy = "oneshot"
inspector_port = 8083

# ── Edge Functions ────────────────────────────────────────────────────────
# Proxies de formulário público (Web3Forms). São chamados sem usuário logado
# (inclusive visitantes), enviando apenas a publishable key — que NÃO é um JWT.
# Com verify_jwt=true (default) o gateway do Supabase rejeita com 401 antes de
# chegar na função. Estes proxies não precisam de auth de usuário (a proteção é
# a WEB3FORMS_KEY no servidor + validação de origem/CORS), então: verify_jwt=false.
[functions.send-flag]
verify_jwt = false

[functions.send-contact]
verify_jwt = false
