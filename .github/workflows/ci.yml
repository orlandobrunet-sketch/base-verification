name: NefroQuest CI

on:
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

        with:
          fetch-depth: 0

      - name: Editorial batch scope gate
        run: >-
          node scripts/editorial-batch-validator.mjs
          --base "${{ github.event.pull_request.base.sha }}"
          --head "${{ github.event.pull_request.head.sha }}"

      # ── 1. Versão: SW deve estar em sincronia com version.json ──────────────
      - name: Check version sync (SW ↔ version.json)
        run: |
          SW_VERSION=$(grep -oP "nefroquest-v\K[0-9.]+" sw.js | head -1)
          JSON_VERSION=$(grep -oP '"version"\s*:\s*"\K[^"]+' version.json | head -1)
          echo "SW cache key version: $SW_VERSION"
          echo "version.json: $JSON_VERSION"
          if [ "$SW_VERSION" != "$JSON_VERSION" ]; then
            echo "❌ Version mismatch: sw.js='$SW_VERSION' vs version.json='$JSON_VERSION'"
            exit 1
          fi
          # Sentry release deve acompanhar a versão (senão o release tracking fica
          # stale — aconteceu: ficou preso em 12.27 por 9 versões).
          SENTRY_VERSION=$(grep -oP "release:\s*'nefroquest@\K[0-9.]+" index.html | head -1)
          echo "Sentry release: $SENTRY_VERSION"
          if [ "$SENTRY_VERSION" != "$JSON_VERSION" ]; then
            echo "❌ Sentry release mismatch: index.html='$SENTRY_VERSION' vs version.json='$JSON_VERSION'"
            exit 1
          fi
          echo "✅ Versions in sync ($JSON_VERSION) — SW + Sentry release"

      # ── 2. Tamanho do bundle (budget: 2.5MB) ───────────────────────────────
      - name: Bundle size check
        run: |
          SIZE=$(stat -c%s index.html)
          LIMIT=2621440  # 2.5 MB
          SIZE_KB=$((SIZE / 1024))
          echo "index.html size: ${SIZE_KB}KB"
          if [ $SIZE -gt $LIMIT ]; then
            echo "❌ Bundle too large: ${SIZE_KB}KB > 2560KB limit"
            exit 1
          fi
          echo "✅ Bundle size OK (${SIZE_KB}KB)"

      # ── 3. HTML estrutural: tag críticas obrigatórias ─────────────────────
      - name: HTML structure check
        run: |
          ERRORS=0
          check_html() {
            if ! grep -q "$2" index.html; then
              echo "❌ Missing: $1"
              ERRORS=$((ERRORS+1))
            else
              echo "✅ Found: $1"
            fi
          }
          check_src() {
            if ! grep -rq "$2" index.html js/ data/ 2>/dev/null; then
              echo "❌ Missing: $1"
              ERRORS=$((ERRORS+1))
            else
              echo "✅ Found: $1"
            fi
          }
          check_html "charset meta"            'charset="UTF-8"'
          check_html "viewport meta"           'name="viewport"'
          check_html "title"                   '<title>'
          check_html "manifest link"           'manifest.json'
          check_html "Supabase SDK"            'supabase'
          check_html "Service Worker register" 'serviceWorker.register'
          check_src  "question bank (data)"    'questionBank'
          check_src  "boss start constant"     'BOSS_START_CORRECT'
          if [ $ERRORS -gt 0 ]; then
            echo "❌ $ERRORS structural check(s) failed"
            exit 1
          fi
          echo "✅ All structural checks passed"

      # ── 3b. Sintaxe JS: todo js/*.js e data/*.js deve parsear ──────────────
      - name: JS syntax check (node --check)
        run: |
          ERRORS=0
          for f in js/*.js data/*.js; do
            if node --check "$f"; then
              echo "✅ $f"
            else
              echo "❌ Syntax error in $f"
              ERRORS=$((ERRORS+1))
            fi
          done
          if [ $ERRORS -gt 0 ]; then
            echo "❌ $ERRORS file(s) failed to parse"
            exit 1
          fi
          echo "✅ All JS files parse cleanly"

      # ── 3c. Typecheck das Edge Functions (Deno) — BLOQUEANTE ───────────────
      # Bloqueia o merge em caso de erro de tipos nas Edge Functions.
      - name: Setup Deno
        continue-on-error: true   # não bloquear o merge se deno.com estiver indisponível (setup-deno busca versions.json)
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Edge Functions typecheck (deno check)
        run: |
          # Se o Setup Deno falhou (indisponibilidade de deno.com), não bloquear o
          # merge por falha de infra — só pular. Quando o deno ESTÁ presente, o
          # typecheck permanece bloqueante e pega erros de tipo reais.
          if ! command -v deno >/dev/null 2>&1; then
            echo "⚠️ Deno indisponível (Setup Deno falhou). Pulando typecheck — não bloqueia por falha de infra."
            exit 0
          fi
          ERRORS=0
          for f in supabase/functions/*/index.ts; do
            if deno check "$f"; then
              echo "✅ $f"
            else
              echo "❌ Type error in $f"
              ERRORS=$((ERRORS+1))
            fi
          done
          if [ $ERRORS -gt 0 ]; then
            echo "❌ $ERRORS function(s) failed typecheck"
            exit 1
          fi
          echo "✅ All edge functions typecheck cleanly"

      # ── 4. Segurança: chaves hardcoded suspeitas ───────────────────────────
      - name: Secret leak check
        run: |
          ERRORS=0
          # Detectar padrões de service_role ou JWT secret (nunca devem estar no front)
          if grep -rqE 'service_role|eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9\.[a-zA-Z0-9_-]{40,}' index.html js/; then
            echo "❌ Possible service_role key or privileged JWT found in index.html"
            ERRORS=$((ERRORS+1))
          else
            echo "✅ No privileged Supabase keys detected"
          fi
          if [ $ERRORS -gt 0 ]; then exit 1; fi

      # ── 5. Vercel config: headers de segurança presentes ──────────────────
      - name: Vercel security headers check
        run: |
          ERRORS=0
          check_header() {
            if ! grep -q "$1" vercel.json; then
              echo "❌ Missing header: $1"
              ERRORS=$((ERRORS+1))
            else
              echo "✅ Header present: $1"
            fi
          }
          check_header "X-Content-Type-Options"
          check_header "X-Frame-Options"
          check_header "Referrer-Policy"
          check_header "Permissions-Policy"
          if [ $ERRORS -gt 0 ]; then exit 1; fi
          echo "✅ All security headers configured"

      # ── 6. XSS guard: innerHTML com dados externos deve usar escapeHtml ──
      - name: XSS innerHTML guard
        run: |
          ERRORS=0
          # Detecta padrões perigosos: innerHTML recebendo variável de API/user sem escapeHtml
          # Padrão: innerHTML = `...${var}...` onde var vem de r. (Supabase row) ou data. (fetch)
          # Falsos positivos esperados: 0 (escapeHtml é aplicado antes em _renderMentorMarkdown e leaderboard)
          if grep -rn 'innerHTML.*\${\(r\.\|data\.\|result\.\|response\.\)\([a-z_]*\)}' js/ 2>/dev/null | grep -v escapeHtml | grep -v '//'; then
            echo "❌ Possible unescaped external data in innerHTML — wrap with escapeHtml()"
            ERRORS=$((ERRORS+1))
          else
            echo "✅ No unescaped external data detected in innerHTML"
          fi
          if [ $ERRORS -gt 0 ]; then exit 1; fi

  # ── Job separado: Playwright Smoke E2E ────────────────────────────────────
  smoke-e2e:
    name: Smoke E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tests/package.json

      - name: Install Playwright deps
        working-directory: tests
        run: npm install

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('tests/package.json') }}

      - name: Install Playwright browsers (if cache miss)
        working-directory: tests
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps

      - name: Start local server
        run: |
          npm install -g serve
          serve . -p 5500 &
          # Aguarda servidor estar pronto (até 30s)
          for i in $(seq 1 30); do
            curl -sf http://localhost:5500/ > /dev/null && echo "✅ Server ready" && break
            sleep 1
          done

      - name: Run Playwright smoke tests
        working-directory: tests
        run: npx playwright test specs/01-landing.spec.ts specs/09-unit-pure-functions.spec.ts --reporter=list --timeout=20000
        env:
          BASE_URL: http://localhost:5500

  # ── Job separado: Playwright E2E Completo (Informativo) ───────────────────
  e2e:
    name: Full E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: smoke-e2e
    timeout-minutes: 12
    continue-on-error: true   # informativo — não bloqueia merge em CI local

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tests/package.json

      - name: Install Playwright deps
        working-directory: tests
        run: npm install

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('tests/package.json') }}

      - name: Install Playwright browsers (if cache miss)
        working-directory: tests
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps

      - name: Start local server
        run: |
          npm install -g serve
          serve . -p 5500 &
          # Aguarda servidor estar pronto (até 30s)
          for i in $(seq 1 30); do
            curl -sf http://localhost:5500/ > /dev/null && echo "✅ Server ready" && break
            sleep 1
          done

      - name: Run Playwright tests
        working-directory: tests
        run: npx playwright test --reporter=list --timeout=20000 || echo "⚠️ E2E informational — failures above do not block merge"
        env:
          BASE_URL: http://localhost:5500

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/report/
          retention-days: 7
